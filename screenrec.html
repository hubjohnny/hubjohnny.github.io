<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromebook Screen Recorder</title>
<style>
body {
margin: 0;
background-color: #1a1a1a;
color: white;
font-family: system-ui, -apple-system, sans-serif;
height: 100vh;
display: flex;
flex-direction: column;
overflow: hidden;
}
#video-container {
flex-grow: 1;
width: 100%;
height: 100%;
position: relative;
display: flex;
justify-content: center;
align-items: center;
background: #000;
}
video {
width: 100%;
height: 100%;
object-fit: contain;
}
.controls {
position: absolute;
bottom: 30px;
z-index: 10;
background: rgba(0, 0, 0, 0.7);
padding: 15px 25px;
border-radius: 50px;
display: flex;
gap: 15px;
backdrop-filter: blur(5px);
}
button {
padding: 12px 24px;
border: none;
border-radius: 25px;
font-size: 16px;
font-weight: 600;
cursor: pointer;
transition: transform 0.2s, background 0.2s;
}
button:active {
transform: scale(0.95);
}
#btn-start {
background-color: #2ecc71;
color: #fff;
}
#btn-stop {
background-color: #e74c3c;
color: #fff;
display: none;
}
#countdown-overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.8);
display: none;
justify-content: center;
align-items: center;
z-index: 20;
flex-direction: column;
}
#countdown-text {
font-size: 150px;
font-weight: bold;
color: #fff;
}
.status-text {
font-size: 24px;
margin-top: 20px;
color: #ddd;
}
.recording-indicator {
position: absolute;
top: 20px;
right: 20px;
width: 20px;
height: 20px;
background-color: red;
border-radius: 50%;
display: none;
box-shadow: 0 0 10px red;
animation: pulse 1.5s infinite;
z-index: 15;
}
@keyframes pulse {
0% { opacity: 1; }
50% { opacity: 0.5; }
100% { opacity: 1; }
}
</style>
</head>
<body>
<div id="video-container">
<video id="preview" autoplay muted></video>
<div id="countdown-overlay">
<div id="countdown-text">10</div>
<div class="status-text">Get Ready...</div>
</div>
<div class="recording-indicator" id="rec-dot"></div>
<div class="controls">
<button id="btn-start">Start Recording</button>
<button id="btn-stop">Stop & Save</button>
</div>
</div>
<script>
const preview = document.getElementById('preview');
const startBtn = document.getElementById('btn-start');
const stopBtn = document.getElementById('btn-stop');
const countdownOverlay = document.getElementById('countdown-overlay');
const countdownText = document.getElementById('countdown-text');
const recDot = document.getElementById('rec-dot');
let mediaRecorder;
let recordedChunks = [];
let stream;
const displayMediaOptions = {
video: {
width: { ideal: 1920 },
height: { ideal: 1080 },
frameRate: { ideal: 30 },
cursor: "never"
},
audio: {
echoCancellation: false,
noiseSuppression: false,
autoGainControl: false,
}
};
startBtn.addEventListener('click', async () => {
try {
stream = await navigator.mediaDevices.getDisplayMedia(displayMediaOptions);
preview.srcObject = stream;
startCountdown();
stream.getVideoTracks()[0].onended = () => {
stopRecording();
};
} catch (err) {
console.error("Error: " + err);
}
});
function startCountdown() {
startBtn.style.display = 'none';
countdownOverlay.style.display = 'flex';
let timeLeft = 10;
countdownText.innerText = timeLeft;
const timer = setInterval(() => {
timeLeft--;
countdownText.innerText = timeLeft;
if (timeLeft <= 0) {
clearInterval(timer);
countdownOverlay.style.display = 'none';
beginRecording();
}
}, 1000);
}
function beginRecording() {
const mimeType = MediaRecorder.isTypeSupported("video/webm;codecs=vp9")
? "video/webm;codecs=vp9"
: "video/webm";
mediaRecorder = new MediaRecorder(stream, {
mimeType: mimeType,
videoBitsPerSecond: 5000000
});
mediaRecorder.ondataavailable = handleDataAvailable;
mediaRecorder.start();
stopBtn.style.display = 'block';
recDot.style.display = 'block';
console.log("Recording started");
}
function handleDataAvailable(event) {
if (event.data.size > 0) {
recordedChunks.push(event.data);
}
}
stopBtn.addEventListener('click', stopRecording);
function stopRecording() {
if (!mediaRecorder || mediaRecorder.state === "inactive") return;
mediaRecorder.stop();
stream.getTracks().forEach(track => track.stop());
mediaRecorder.onstop = () => {
const blob = new Blob(recordedChunks, {
type: "video/webm"
});
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
document.body.appendChild(a);
a.style = "display: none";
a.href = url;
const now = new Date();
const filename = `screen-rec-${now.toISOString().slice(0,19).replace(/:/g,"-")}.webm`;
a.download = filename;
a.click();
window.URL.revokeObjectURL(url);
location.reload();
};
}
</script>
</body>
</html>
